version: '3.8'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: baseproject-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Redis (optional — for distributed caching)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: baseproject-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # User Management — DbMigrator
  # ============================================================
  user-management-migrator:
    build:
      context: ./user-management
      dockerfile: ../docker/Dockerfile.user-management-migrator
    container_name: baseproject-user-mgmt-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=BaseProject_UserManagement;Username=postgres;Password=postgres"

  # ============================================================
  # Machine Tools — DbMigrator
  # ============================================================
  machine-tools-migrator:
    build:
      context: ./machine-tools-management/server
      dockerfile: ../../docker/Dockerfile.machine-tools-migrator
    container_name: baseproject-machine-tools-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=BaseProject_MachineTools;Username=postgres;Password=postgres"

  # ============================================================
  # User Management — API Host
  # ============================================================
  user-management-api:
    build:
      context: ./user-management
      dockerfile: ../docker/Dockerfile.user-management-api
    container_name: baseproject-user-mgmt-api
    restart: unless-stopped
    ports:
      - "44301:8080"
    depends_on:
      postgres:
        condition: service_healthy
      user-management-migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=BaseProject_UserManagement;Username=postgres;Password=postgres"
      Redis__Configuration: "redis:6379"
      Redis__IsEnabled: "false"
      App__CorsOrigins: "http://localhost:3000,http://localhost:8081,http://localhost:19000"

  # ============================================================
  # Machine Tools — API Host
  # ============================================================
  machine-tools-api:
    build:
      context: ./machine-tools-management/server
      dockerfile: ../../docker/Dockerfile.machine-tools-api
    container_name: baseproject-machine-tools-api
    restart: unless-stopped
    ports:
      - "44302:8080"
    depends_on:
      postgres:
        condition: service_healthy
      machine-tools-migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=BaseProject_MachineTools;Username=postgres;Password=postgres"
      App__CorsOrigins: "http://localhost:3000,http://localhost:3001,http://localhost:8081"

  # ============================================================
  # Web Admin (React + Vite)
  # ============================================================
  web-admin:
    build:
      context: ./machine-tools-management/web-admin
      dockerfile: ../../docker/Dockerfile.web-admin
    container_name: baseproject-web-admin
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx-web-admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user-management-api
      - machine-tools-api

volumes:
  postgres_data:
    name: baseproject_pgdata
